<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <script src="./js/sessao.js"></script>

    <link rel="icon" href="./assets/icon/favicon2.ico">

    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body onload="listar()">

    <!-- Header -->
    <header class="header">
        <div class="container">

            <a href="#" class="logo">
                <img src="imgs/Logo_cor_branca.png" alt="Logo">
            </a>

            <nav class="navbar">
                <a href="index.html">Inicial</a>
                <a href="simulador.html">Simulador</a>
                <a href="login.html">Login</a>
                <a href="cadastro.html">Cadastro</a>
            </nav>

        </div>
    </header>

    <!-- Cadastro -->
    <div class="main-login">

        <!-- Lado esquerdo -->
        <div class="left-login">
            <img
                src="./assets/imgs/Biblioteca-naciona-RJ.jpg"
                class="left-image"
                alt="Imagem de fundo">
        </div>

        <!-- Lado direito -->
        <div class="right-login">

            <div class="card-login">

                <div class="titulo">
                    <h1>CADASTRO</h1>
                </div>

                <div class="textfield">
                    <label for="codigo_input">Código de ativação</label>
                    <input
                        id="codigo_input"
                        type="text"
                        placeholder="Digite o código">
                </div>

                <div class="textfield">
                    <label for="nome_input">Nome</label>
                    <input
                        id="nome_input"
                        type="text"
                        placeholder="Digite seu nome">
                </div>

                <div class="textfield">
                    <label for="cpf_input">CPF</label>
                    <input
                        id="cpf_input"
                        type="text"
                        placeholder="000.000.000-00">
                </div>

                <div class="textfield">
                    <label for="email_input">E-mail</label>
                    <input
                        id="email_input"
                        type="email"
                        placeholder="email@gmail.com">
                </div>

                <div class="textfield">
                    <label for="senha_input">Senha</label>

                    <div class="senha-container">
                        <input
                            id="senha_input"
                            type="password"
                            placeholder="Digite sua senha">

                        <img
                            src="assets/imgs/olho_fechado.png"
                            id="icone_olho"
                            class="olho"
                            onclick="olhoSenha()"
                            alt="Mostrar senha">
                    </div>
                </div>

                <div class="textfield">
                    <label for="confirmacao_senha_input">
                        Confirmar senha
                    </label>

                    <div class="senha-container">
                        <input
                            id="confirmacao_senha_input"
                            type="password"
                            placeholder="Confirme sua senha">

                        <img
                            src="assets/imgs/olho_fechado.png"
                            id="icone_olho2"
                            class="olho"
                            onclick="olhoConfirmacao()"
                            alt="Mostrar senha">
                    </div>
                </div>

                <button
                    class="btn-login"
                    onclick="cadastrar()">
                    Cadastrar
                </button>

                <div class="btn-cadastro">
                   <p class="plog">
                Já possui uma conta?
                <a href="login.html" id="btn_login" class="btn_login">Login</a>
           
            </p>
                </div>
                <div id="div_erros_login"></div>

            </div>

        </div>

    </div>

</body>

</html>

<script>

let listaEmpresasCadastradas = [];

function olhoSenha() {
    const input = document.getElementById("senha_input");
    const icone = document.getElementById("icone_olho");

    if (input.type === "password") {
        input.type = "text";
        icone.src = "assets/imgs/olho_aberto.png";
    } else {
        input.type = "password";
        icone.src = "assets/imgs/olho_fechado.png";
    }
}

function olhoConfirmacao() {
    const input = document.getElementById("confirmacao_senha_input");
    const icone = document.getElementById("icone_olho2");

    if (input.type === "password") {
        input.type = "text";
        icone.src = "assets/imgs/olho_aberto.png";
    } else {
        input.type = "password";
        icone.src = "assets/imgs/olho_fechado.png";
    }
}

function cadastrar() {

    var nomeVar = nome_input.value;
    var cpfVar = cpf_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;

    var idEmpresaVincular;

    if (
        nomeVar == "" ||
        cpfVar == "" ||
        emailVar == "" ||
        senhaVar == "" ||
        confirmacaoSenhaVar == "" ||
        codigoVar == ""
    ) {

        div_erros_login.innerHTML =
            "Preencha todos os campos.";

        return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {

        div_erros_login.innerHTML =
            "As senhas não coincidem.";

        return false;
    }

    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {

        if (
            listaEmpresasCadastradas[i].codigo_ativacao ==
            codigoVar
        ) {

            idEmpresaVincular =
                listaEmpresasCadastradas[i].id;

            break;
        }
    }

    if (!idEmpresaVincular) {

        div_erros_login.innerHTML =
            "Código de ativação inválido.";

        return false;
    }

    fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nomeServer: nomeVar,
            cpfServer: cpfVar,
            emailServer: emailVar,
            senhaServer: senhaVar,
            idEmpresaVincularServer:
                idEmpresaVincular
        })
    })
    .then(function (resposta) {

        if (resposta.ok) {

            div_erros_login.innerHTML =
                "Cadastro realizado com sucesso!";

            setTimeout(() => {
                window.location = "login.html";
            }, 2000);

        } else {

            throw "Erro ao cadastrar";
        }

    })
    .catch(function (erro) {

        console.log(erro);

        div_erros_login.innerHTML =
            "Erro ao realizar cadastro.";
    });
}

function listar() {

    fetch("/empresas/listar", {
        method: "GET"
    })
    .then(function (resposta) {

        resposta.json().then((empresas) => {

            empresas.forEach((empresa) => {
                listaEmpresasCadastradas.push(empresa);
            });

        });

    })
    .catch(function (erro) {
        console.log(erro);
    });
}

</script>
